name: Deploy to Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to Staging
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create staging wrangler config
        run: |
          cat > wrangler.staging.jsonc << EOF
          {
            "\$schema": "node_modules/wrangler/config-schema.json",
            "name": "talos-pioneers-staging",
            "main": "./.output/server/index.mjs",
            "compatibility_date": "2025-11-15",
            "assets": {
              "binding": "ASSETS",
              "directory": "./.output/public/"
            },
            "observability": {
              "enabled": true
            },
            "compatibility_flags": [
              "nodejs_als",
              "nodejs_compat"
            ],
            "version_metadata": {
              "binding": "CF_VERSION_METADATA"
            },
            "vars": {
              "BASE_URL": "${{ secrets.STAGING_BASE_URL }}",
              "API_URL": "${{ secrets.STAGING_API_URL }}"
            }
          }
          EOF

      - name: Build
        run: npx nuxt build
        env:
          CLOUDFLARE_ENV: staging
          API_URL: ${{ secrets.STAGING_API_URL }}
          BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          BASE_DOMAIN: ${{ secrets.STAGING_BASE_DOMAIN }}
          NUXT_PUBLIC_SENTRY_DSN: ${{ secrets.NUXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.staging.jsonc
